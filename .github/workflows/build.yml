name: Build NEXUS installer

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: pip install PySide6 pyinstaller

      - name: Run logic tests
        run: python test_va_math.py

      - name: Build NEXUS.exe
        run: >
          pyinstaller --noconfirm --clean --windowed --name NEXUS
          --icon assets/nexus.ico
          --add-data "content;content"
          --add-data "assets;assets"
          qt_main.py

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: iscc installer.iss

      - name: Make portable zip
        run: Compress-Archive -Path dist/NEXUS/* -DestinationPath installer_out/NEXUS-portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NEXUS-installer
          path: installer_out/*

      - name: Attach to release (on version tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: installer_out/*
